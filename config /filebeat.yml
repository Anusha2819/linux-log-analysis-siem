filebeat.inputs:

# Suricata JSON events (rich data for SIEM)
- type: log
  enabled: true
  paths:
    - /var/log/suricata/eve.json
  json.keys_under_root: true
  json.add_error_key: true
  tags: ["suricata", "ids", "soc-lab"]

# Auth log — login attempts, sudo usage
- type: log
  enabled: true
  paths:
    - /var/log/auth.log
  tags: ["auth", "linux", "soc-lab"]

# Syslog — system events
- type: log
  enabled: true
  paths:
    - /var/log/syslog
  tags: ["syslog", "linux", "soc-lab"]

# Python analyser reports
- type: log
  enabled: true
  paths:
    - /root/log-analysis-project/reports/*.json
  json.keys_under_root: true
  tags: ["soc-report", "analysis"]

# Output to Elasticsearch
output.elasticsearch:
  hosts: ["http://localhost:9200"]
  protocol: "http"

# Kibana setup
setup.kibana:
  host: "localhost:5601"

# Template settings
setup.ilm.enabled: false
setup.template.enabled: true
setup.template.name: "filebeat"
setup.template.pattern: "filebeat-*"
